name: Build BLE HID Keyboard for HolyIoT YJ-17095

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v2.9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup NCS Environment
        run: |
          # Initialize west workspace
          west init -l .
          west update -n --fetch-opt=--depth=1
          
          # Source Zephyr environment
          source /opt/ncs/toolchain/*/zephyr-env.sh || true
          echo "ZEPHYR_BASE=$ZEPHYR_BASE"

      - name: Build Firmware
        run: |
          west build -b holyiot_yj17095 app --pristine -- -DCONF_FILE=prj.conf

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-ble-hid-keyboard
          path: build/zephyr/zephyr.hex
          retention-days: 30
