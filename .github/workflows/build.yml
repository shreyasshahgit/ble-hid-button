name: Build BLE HID Keyboard

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: ghcr.io/nrfconnect/sdk-nrf: v2.9.0   # Match your west.yml version

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: West Init & Update
        run: |
          west init -l .
          west update -n

      - name: Build
        run: |
          west build -b holyiot_yj17095 app -- -DCONF_FILE=prj.conf

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-ble-hid-keyboard
          path: build/zephyr/zephyr.hex
