CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_INPUT_REP=y

CONFIG_BT_DEVICE_NAME="YJ17095 HID Keyboard"
CONFIG_BT_DEVICE_APPEARANCE=0x03C0   # Keyboard

# GPIO & Input
CONFIG_GPIO=y
CONFIG_INPUT=y
CONFIG_INPUT_GPIO_KEYS=y

# Required for HIDS
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_HIDS_MAX_INPUT_REP=1
CONFIG_BT_HIDS_MAX_FEATURE_REP=1
CONFIG_BT_HIDS_MAX_OUTPUT_REP=1

# Advertising
CONFIG_BT_ADVERTISE=y
CONFIG_BT_PRIVACY=n

# Power saving
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_BT_MAX_CONN=1

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
