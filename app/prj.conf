CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_INPUT_REP=y
CONFIG_BT_HIDS_FEATURE_REP=y
CONFIG_BT_HIDS_OUTPUT_REP=y

CONFIG_BT_DEVICE_NAME="YJ17095 HID Keyboard"
CONFIG_BT_DEVICE_APPEARANCE=0x03C0  # Keyboard

# GPIO & Input
CONFIG_GPIO=y
CONFIG_INPUT=y
CONFIG_INPUT_GPIO_KEYS=y

# Power / Optimization
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_EXT_ADV=n

# Logging (disable for production)
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
